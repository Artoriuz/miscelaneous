# VO + hwdec
vo=gpu-next
hwdec=auto-safe

# Screenshots
screenshot-format=png
screenshot-high-bit-depth=no
screenshot-dir="~/Pictures/mpvshots"
screenshot-template="%F-%wH_%wM_%wS_%#02n"

# Misc
no-hidpi-window-scale
audio-channels=stereo
alang=jpn,en
slang=en
dither-depth=8

# Profiles
[720p]
profile-desc=720p
profile-cond=width == 1280
glsl-shader="~~/shaders/ArtCNN_C4F16_DS.glsl"
glsl-shader="~~/shaders/cfl_prediction.glsl"

[1080p]
profile-desc=1080p
profile-cond=width == 1920
glsl-shader="~~/shaders/ArtCNN_C4F8_DS.glsl"
glsl-shader="~~/shaders/cfl_prediction.glsl"

[bench]
audio=no
untimed=yes
video-sync=display-desync
vulkan-swap-mode=immediate
d3d11-sync-interval=0
osd-msg1="FPS: ${estimated-display-fps}"
