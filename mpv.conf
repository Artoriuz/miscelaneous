# VO + Profile + hwdec
vo=gpu-next
profile=high-quality
hwdec=auto-safe

# Scaling
scale=ewa_robidoux
scale-param1=0.10
scale-param2=0.45

cscale=ewa_robidoux
cscale-param1=0.10
cscale-param2=0.45

# Screenshots
screenshot-format=png
screenshot-high-bit-depth=no
screenshot-directory="C:\Users\joao\Pictures\mpvshots"
screenshot-template="%F-%wH_%wM_%wS_%#02n"

# Misc
no-hidpi-window-scale
alang=jpn,en
slang=en

# Meme shaders
# glsl-shader="~~/shaders/cfl_prediction.glsl"

[bench]
audio=no
untimed=yes
video-sync=display-desync
vulkan-swap-mode=immediate
d3d11-sync-interval=0
osd-msg1="FPS: ${estimated-display-fps}"